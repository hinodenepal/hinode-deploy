<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Red Circle (Sun) -->
  <circle cx="600" cy="280" r="280" fill="#DC143C"/>

  <!-- White Mountains -->
  <!-- Left Mountain -->
  <polygon points="250,550 400,350 550,550" fill="white"/>

  <!-- Center Mountain (tallest) -->
  <polygon points="450,550 650,250 850,550" fill="white"/>

  <!-- Right Mountain -->
